# Copy to $XDG_CONFIG_HOME/amptui/config.toml (usually ~/.config/amptui/config.toml)
# Both values can also be supplied via AMPTUI_SERVER_URL / AMPTUI_TOKEN env vars.

server_url = "http://192.168.1.10:32400"
token = "your-X-Plex-Token-here"

# Optional: open straight into this music library instead of the picker.
# Matched against a library's section key or title (case-insensitive).
# default_library = "Music"

# Optional: initial render mode for each browser level — "list" or "grid".
# Editable from the settings screen (,).
# default_view_artist = "list"
# default_view_album = "list"

# Optional: which screen amptui opens on — "dashboard" (default) or "library".
# Tab toggles between them at runtime. Editable from the settings screen (,).
# home = "dashboard"
