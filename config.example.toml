# Copy to $XDG_CONFIG_HOME/amptui/config.toml (usually ~/.config/amptui/config.toml).
# Every value can also be supplied via AMPTUI_* env vars (see the README).

# Which server type to drive: "plex" (default) or "jellyfin".
backend = "plex"

server_url = "http://192.168.1.10:32400"

# Plex auth (backend = "plex"): an X-Plex-Token.
plex_token = "your-X-Plex-Token-here"

# Jellyfin auth (backend = "jellyfin"): username + password, exchanged for
# an access token + user id at startup. (Jellyfin's default port is 8096.)
# jellyfin_username = "you"
# jellyfin_password = "secret"

# Optional: open straight into this music library instead of the picker.
# Matched against a library's section key or title (case-insensitive).
# default_library = "Music"

# Optional: initial render mode for each browser level — "list" or "grid".
# Editable from the settings screen (,).
# default_view_artist = "list"
# default_view_album = "list"

# Optional: which screen amptui opens on — "library" (default) or "dashboard".
# Tab toggles between them at runtime. Editable from the settings screen (,).
# home = "library"

# Optional: where `d` saves downloaded tracks and albums. amptui writes to
# <download_folder>/<artist>/<album>/<NN Title>.<ext>, skipping files that
# already exist. Leave empty to disable downloads (pressing `d` no-ops with
# a hint to set this).
# download_folder = "~/Music/amptui"
